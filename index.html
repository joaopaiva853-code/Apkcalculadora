<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JB Financeiro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JB Financeiro">
    <meta name="theme-color" content="#6c5ce7">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2d3436;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-attachment: fixed;
        }
        .app {
            width: 100%;
            max-width: 500px;
            padding: 25px 16px 30px;
        }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: #2d3436;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.03);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:active { transform: scale(0.97); }
        .card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 10px;
            opacity: 0.7;
        }
        .card .valor {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .receita h3 { color: #00b894; }
        .receita .valor { color: #00b894; }
        .despesa h3 { color: #e17055; }
        .despesa .valor { color: #e17055; }
        .compra h3 { color: #fdcb6e; }
        .compra .valor { color: #e17055; }
        .saldo {
            grid-column: span 2;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            border: none;
            box-shadow: 0 15px 30px rgba(108, 92, 231, 0.3);
        }
        .saldo h3 { color: rgba(255,255,255,0.8); }
        .saldo .valor { color: white; font-size: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }

        .btn-flutuante {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.5);
            border: none;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            transition: all 0.3s ease;
            transform-origin: center;
        }
        .btn-flutuante:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(108, 92, 231, 0.6);
        }
        .btn-flutuante:active { transform: scale(0.9); }

        .form-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.03);
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .form-header {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid transparent;
            transition: background 0.2s;
            color: #2d3436;
        }
        .form-header:hover { background: rgba(108, 92, 231, 0.05); }
        .form-header .icon-toggle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.3s ease;
        }
        .form-card.aberto .form-header {
            border-bottom: 1px solid rgba(108, 92, 231, 0.15);
        }
        .form-card.aberto .form-header .icon-toggle {
            transform: rotate(45deg);
            background: linear-gradient(135deg, #e17055, #d63031);
        }
        .form-body {
            padding: 0 20px 20px;
            display: none;
        }
        .form-card.aberto .form-body {
            display: block;
        }
        .input-row {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #636e72;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input, .input-group select {
            padding: 14px 16px;
            border: 1px solid #dfe6e9;
            border-radius: 16px;
            font-size: 1rem;
            width: 100%;
            background: rgba(255,255,255,0.7);
            transition: all 0.2s;
            color: #2d3436;
            outline: none;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
            background: white;
        }
        .two-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .btn-add {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .btn-add:active { transform: scale(0.98); background: linear-gradient(135deg, #5b4cdb, #8c7ae6); }

        .filtros {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }
        .filtros select, .filtros input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid #dfe6e9;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: #2d3436;
            outline: none;
        }
        .filtros select:focus, .filtros input:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }

        .lista-transacoes {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 80px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .transacao-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            gap: 12px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .transacao-item:active { background: rgba(108, 92, 231, 0.03); }
        .transacao-item:last-child { border-bottom: none; }
        .transacao-info { flex: 1; }
        .transacao-desc { font-weight: 600; margin-bottom: 4px; color: #2d3436; }
        .transacao-meta {
            font-size: 0.75rem;
            color: #636e72;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .transacao-valor {
            font-weight: 700;
            font-size: 1rem;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }
        .transacao-actions button {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px;
            color: #e17055;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .transacao-actions button:hover { opacity: 1; }
        .sem-dados {
            text-align: center;
            padding: 40px 20px;
            color: #b2bec3;
            font-style: italic;
        }
        footer {
            text-align: center;
            margin-top: 10px;
            color: #636e72;
            font-size: 0.8rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>💰 JB Financeiro</h1>

        <!-- Cards Resumo -->
        <div class="cards">
            <div class="card receita">
                <h3>Receitas</h3>
                <div class="valor" id="totalReceitas">R$ 0</div>
            </div>
            <div class="card despesa">
                <h3>Despesas</h3>
                <div class="valor" id="totalDespesas">R$ 0</div>
            </div>
            <div class="card compra">
                <h3>Compras</h3>
                <div class="valor" id="totalCompras">R$ 0</div>
            </div>
            <div class="card saldo">
                <h3>Saldo Líquido</h3>
                <div class="valor" id="saldoLiquido">R$ 0</div>
            </div>
        </div>

        <!-- Formulário expansível -->
        <div class="form-card" id="formCard">
            <div class="form-header" onclick="toggleFormulario()">
                <div class="icon-toggle">+</div> Nova Transação
            </div>
            <div class="form-body">
                <div class="input-row">
                    <div class="input-group">
                        <label>Data</label>
                        <input type="date" id="data">
                    </div>
                    <div class="two-cols">
                        <div class="input-group">
                            <label>Tipo</label>
                            <select id="tipo">
                                <option value="Receita">Receita</option>
                                <option value="Compra">Compra</option>
                                <option value="Despesa">Despesa</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Categoria</label>
                            <input type="text" id="categoria" placeholder="Ex: Vendas, Aluguel...">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Descrição</label>
                        <input type="text" id="descricao" placeholder="Detalhes da transação">
                    </div>
                    <div class="two-cols">
                        <div class="input-group">
                            <label>Valor R$</label>
                            <input type="number" id="valor" step="0.01" min="0.01" placeholder="0,00">
                        </div>
                        <div class="input-group">
                            <label>Pagamento</label>
                            <select id="formaPagamento">
                                <option>PIX</option>
                                <option>Dinheiro</option>
                                <option>Cartão Crédito</option>
                                <option>Cartão Débito</option>
                                <option>Boleto</option>
                                <option>Transferência</option>
                            </select>
                        </div>
                    </div>
                    <div class="two-cols">
                        <div class="input-group">
                            <label>Status</label>
                            <select id="status">
                                <option>Pago/Recebido</option>
                                <option>Pendente</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Obs</label>
                            <input type="text" id="observacoes" placeholder="Opcional">
                        </div>
                    </div>
                    <button class="btn-add" onclick="adicionarTransacao()">✅ Adicionar</button>
                </div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filtros">
            <select id="filtroTipo" onchange="renderizarLista()">
                <option value="Todos">Todos</option>
                <option value="Receita">Receitas</option>
                <option value="Compra">Compras</option>
                <option value="Despesa">Despesas</option>
            </select>
            <input type="text" id="filtroBusca" placeholder="Buscar..." oninput="renderizarLista()">
        </div>

        <!-- Lista de Transações -->
        <div class="lista-transacoes" id="listaTransacoes">
            <div class="sem-dados">Nenhuma transação</div>
        </div>
        <footer>✨ Seus dados ficam salvos no aparelho</footer>
    </div>

    <!-- Botão flutuante -->
    <button class="btn-flutuante" onclick="toggleFormulario()" title="Nova transação">+</button>

    <script>
        // ==================== GERADOR DE ÍCONES E MANIFEST INLINE ====================
        function gerarIconeBase64(tamanho, corFundo, corTexto) {
            const canvas = document.createElement('canvas');
            canvas.width = tamanho;
            canvas.height = tamanho;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(tamanho/2, tamanho/2, tamanho/2 - 4, 0, 2*Math.PI);
            ctx.fillStyle = corFundo;
            ctx.fill();
            ctx.fillStyle = corTexto;
            ctx.font = `bold ${tamanho*0.5}px "Inter"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('JB', tamanho/2, tamanho/2);
            return canvas.toDataURL('image/png');
        }

        const icon192 = gerarIconeBase64(192, '#6c5ce7', '#ffffff');
        const icon512 = gerarIconeBase64(512, '#6c5ce7', '#ffffff');

        const manifestData = {
            name: 'JB Financeiro',
            short_name: 'JB Financeiro',
            description: 'Gerencie compras, despesas e receitas',
            start_url: location.href,
            display: 'standalone',
            background_color: '#f5f7fa',
            theme_color: '#6c5ce7',
            icons: [
                { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
                { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
            ]
        };

        const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const linkManifest = document.createElement('link');
        linkManifest.rel = 'manifest';
        linkManifest.href = manifestURL;
        document.head.appendChild(linkManifest);

        // ==================== SERVICE WORKER INLINE ====================
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'jb-financeiro-v1';
                const ASSETS = ['${location.href}'];
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS)));
                });
                self.addEventListener('activate', e => {
                    e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
                        if(resp.ok) {
                            const clone = resp.clone();
                            caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
                        }
                        return resp;
                    })));
                });
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            const swURL = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swURL, {scope: '/'})
                .then(() => console.log('SW registrado'))
                .catch(err => console.log('SW erro:', err));
        }

        // ==================== LÓGICA DO FORMULÁRIO EXPANSÍVEL ====================
        function toggleFormulario() {
            const card = document.getElementById('formCard');
            const icon = card.querySelector('.icon-toggle');
            if (card.classList.contains('aberto')) {
                card.classList.remove('aberto');
                icon.textContent = '+';
            } else {
                card.classList.add('aberto');
                icon.textContent = '−';
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // ==================== LÓGICA FINANCEIRA ====================
        const STORAGE_KEY = 'jb_financeiro_transacoes';
        let transacoes = [];

        function carregar() {
            const dados = localStorage.getItem(STORAGE_KEY);
            transacoes = dados ? JSON.parse(dados) : [
                { data:'2026-01-01', tipo:'Receita', categoria:'Vendas', descricao:'Venda online', valor:5000, formaPagamento:'PIX', status:'Pago/Recebido', observacoes:'' },
                { data:'2026-01-02', tipo:'Compra', categoria:'Estoque', descricao:'Fornecedor', valor:1200, formaPagamento:'Boleto', status:'Pago/Recebido', observacoes:'' },
                { data:'2026-01-03', tipo:'Despesa', categoria:'Aluguel', descricao:'Sala comercial', valor:800, formaPagamento:'Transferência', status:'Pago/Recebido', observacoes:'' }
            ];
            salvar();
        }

        function salvar() { localStorage.setItem(STORAGE_KEY, JSON.stringify(transacoes)); }

        function totais() {
            let r=0, c=0, d=0;
            transacoes.forEach(t => {
                if(t.tipo === 'Receita') r += t.valor;
                else if(t.tipo === 'Compra') c += t.valor;
                else d += t.valor;
            });
            return { r, c, d, saldo: r - c - d };
        }

        function formatMoeda(v) { return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }

        function atualizarDashboard() {
            const {r, c, d, saldo} = totais();
            document.getElementById('totalReceitas').textContent = formatMoeda(r);
            document.getElementById('totalCompras').textContent = formatMoeda(c);
            document.getElementById('totalDespesas').textContent = formatMoeda(d);
            document.getElementById('saldoLiquido').textContent = formatMoeda(saldo);
        }

        function adicionarTransacao() {
            const data = document.getElementById('data').value;
            const tipo = document.getElementById('tipo').value;
            const categoria = document.getElementById('categoria').value.trim();
            const descricao = document.getElementById('descricao').value.trim();
            const valor = parseFloat(document.getElementById('valor').value);
            const formaPagamento = document.getElementById('formaPagamento').value;
            const status = document.getElementById('status').value;
            const observacoes = document.getElementById('observacoes').value.trim();

            if(!data || !categoria || !descricao || isNaN(valor) || valor <= 0) {
                alert('Preencha todos os campos obrigatórios.');
                return;
            }
            transacoes.push({data, tipo, categoria, descricao, valor, formaPagamento, status, observacoes});
            salvar();
            limparForm();
            renderizarLista();
            atualizarDashboard();
            // Fecha o formulário automaticamente após adicionar
            const card = document.getElementById('formCard');
            if (card.classList.contains('aberto')) {
                toggleFormulario();
            }
        }

        function limparForm() {
            document.getElementById('categoria').value = '';
            document.getElementById('descricao').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('observacoes').value = '';
        }

        function excluir(index) {
            if(confirm('Excluir transação?')) {
                transacoes.splice(index, 1);
                salvar();
                renderizarLista();
                atualizarDashboard();
            }
        }

        function renderizarLista() {
            const filtroTipo = document.getElementById('filtroTipo').value;
            const busca = document.getElementById('filtroBusca').value.toLowerCase();
            const container = document.getElementById('listaTransacoes');

            let filtradas = transacoes.filter(t => {
                const tipoOk = filtroTipo === 'Todos' || t.tipo === filtroTipo;
                const buscaOk = t.descricao.toLowerCase().includes(busca) || t.categoria.toLowerCase().includes(busca);
                return tipoOk && buscaOk;
            });

            if(filtradas.length === 0) {
                container.innerHTML = '<div class="sem-dados">Nenhuma transação encontrada</div>';
                return;
            }

            filtradas.sort((a,b) => new Date(b.data) - new Date(a.data));
            let html = '';
            filtradas.forEach(t => {
                const idx = transacoes.indexOf(t);
                const corValor = t.tipo === 'Receita' ? '#00b894' : (t.tipo === 'Compra' ? '#e17055' : '#d63031');
                const sinal = t.tipo === 'Receita' ? '+' : '-';
                html += `
                    <div class="transacao-item">
                        <div class="transacao-info">
                            <div class="transacao-desc">${t.descricao}</div>
                            <div class="transacao-meta">
                                <span>${t.data.split('-').reverse().join('/')}</span>
                                <span>${t.categoria}</span>
                                <span>${t.status}</span>
                            </div>
                        </div>
                        <div class="transacao-valor" style="color:${corValor}">
                            ${sinal}${formatMoeda(t.valor)}
                        </div>
                        <div class="transacao-actions">
                            <button onclick="excluir(${idx})" title="Excluir">🗑️</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.onload = () => {
            carregar();
            renderizarLista();
            atualizarDashboard();
            document.getElementById('data').value = new Date().toISOString().split('T')[0];
        };
    </script>
</body>
</html>
