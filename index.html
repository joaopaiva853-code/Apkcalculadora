<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JB Financeiro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JB Financeiro">
    <meta name="theme-color" content="#0a0a0a">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* ========== BACKGROUND ANIMADO COM DEGRADÊ ========== */
        .bg-animado {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(45deg, #0a0a0a, #1a1a2e, #16213e, #0f3460, #1a1a2e, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 0%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Partículas flutuantes */
        .particula {
            position: fixed;
            border-radius: 50%;
            background: rgba(108, 92, 231, 0.1);
            z-index: 0;
            pointer-events: none;
            animation: flutuar 8s ease-in-out infinite;
        }
        
        @keyframes flutuar {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            25% { transform: translateY(-20px) translateX(10px); opacity: 0.6; }
            50% { transform: translateY(-10px) translateX(-10px); opacity: 0.4; }
            75% { transform: translateY(-30px) translateX(5px); opacity: 0.5; }
        }
        
        .app {
            width: 100%;
            max-width: 500px;
            padding: 10px 16px 30px;
            position: relative;
            z-index: 1;
        }
        h1 {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(108, 92, 231, 0.3);
        }

        /* ========== CARDS RESUMO ========== */
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .card {
            background: rgba(30, 30, 40, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 18px;
            padding: 14px 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:active { transform: scale(0.97); }
        .card h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 8px;
            opacity: 0.7;
        }
        .card .valor {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .receita {
            border-top: 2px solid #00e676;
        }
        .receita h3 { color: #00e676; }
        .receita .valor { color: #00e676; }
        .despesa {
            border-top: 2px solid #ff6b6b;
        }
        .despesa h3 { color: #ff6b6b; }
        .despesa .valor { color: #ff6b6b; }
        .compra {
            border-top: 2px solid #ffd93d;
        }
        .compra h3 { color: #ffd93d; }
        .compra .valor { color: #ff6b6b; }
        .saldo {
            grid-column: span 2;
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.8) 0%, rgba(139, 92, 246, 0.8) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            border: none;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .saldo h3 { color: rgba(255,255,255,0.8); }
        .saldo .valor { color: white; font-size: 1.8rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        .btn-flutuante {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.5), 0 0 0 3px rgba(108, 92, 231, 0.1);
            border: none;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 25px rgba(108, 92, 231, 0.5), 0 0 0 3px rgba(108, 92, 231, 0.1); }
            50% { box-shadow: 0 8px 30px rgba(108, 92, 231, 0.7), 0 0 0 8px rgba(108, 92, 231, 0.05); }
        }
        
        .btn-flutuante:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(108, 92, 231, 0.6);
        }
        .btn-flutuante:active { transform: scale(0.9); }

        .form-card {
            background: rgba(30, 30, 40, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .form-header {
            padding: 15px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid transparent;
            transition: background 0.2s;
            color: #e0e0e0;
        }
        .form-header:hover { background: rgba(108, 92, 231, 0.1); }
        .form-header .icon-toggle {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.3s ease;
        }
        .form-card.aberto .form-header {
            border-bottom: 1px solid rgba(108, 92, 231, 0.2);
            background: rgba(108, 92, 231, 0.05);
        }
        .form-card.aberto .form-header .icon-toggle {
            transform: rotate(45deg);
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
        }
        .form-body {
            padding: 0 18px 18px;
            display: none;
        }
        .form-card.aberto .form-body {
            display: block;
        }
        .input-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .input-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input, .input-group select {
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 0.95rem;
            width: 100%;
            background: rgba(20, 20, 30, 0.8);
            transition: all 0.2s;
            color: #e0e0e0;
            outline: none;
        }
        .input-group input::placeholder { color: #666; }
        .input-group input:focus, .input-group select:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
            background: rgba(25, 25, 35, 0.9);
        }
        .two-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn-add {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 6px 18px rgba(108, 92, 231, 0.3);
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        .btn-add:active { 
            transform: scale(0.98); 
            background: linear-gradient(135deg, #5b4cdb, #8c7ae6); 
        }

        /* ========== LISTA DE TRANSAÇÕES (OCULTÁVEL) ========== */
        .lista-container {
            background: rgba(30, 30, 40, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }
        .lista-cabecalho {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .lista-cabecalho:hover { background: rgba(108, 92, 231, 0.05); }
        .lista-cabecalho-esquerda {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lista-cabecalho .icon-lista {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(108, 92, 231, 0.25);
            color: #a29bfe;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: transform 0.3s ease;
        }
        .lista-container.aberto .lista-cabecalho .icon-lista {
            transform: rotate(90deg);
        }
        .lista-titulo {
            font-weight: 600;
            color: #e0e0e0;
            font-size: 0.9rem;
        }
        .lista-contador {
            background: rgba(108, 92, 231, 0.25);
            color: #a29bfe;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .lista-conteudo {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .lista-container.aberto .lista-conteudo {
            display: block;
        }
        .filtros {
            display: flex;
            gap: 8px;
            padding: 12px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .filtros select, .filtros input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.82rem;
            background: rgba(20, 20, 30, 0.8);
            color: #e0e0e0;
            outline: none;
        }
        .filtros input::placeholder { color: #666; }
        .filtros select:focus, .filtros input:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }
        .transacoes-lista {
            max-height: 350px;
            overflow-y: auto;
        }
        .transacao-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            gap: 10px;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .transacao-item:active { background: rgba(108, 92, 231, 0.08); }
        .transacao-item:last-child { border-bottom: none; }
        .transacao-info { flex: 1; }
        .transacao-desc { font-weight: 600; margin-bottom: 3px; color: #e0e0e0; }
        .transacao-meta {
            font-size: 0.72rem;
            color: #999;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .transacao-valor {
            font-weight: 700;
            font-size: 0.95rem;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }
        .transacao-actions button {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px;
            color: #ff6b6b;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .transacao-actions button:hover { opacity: 1; }
        .sem-dados {
            text-align: center;
            padding: 35px 20px;
            color: #666;
            font-style: italic;
            font-size: 0.9rem;
        }

        /* ========== CALENDÁRIO EM BAIXO ========== */
        .calendario-container {
            background: rgba(30, 30, 40, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 80px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .calendario-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .calendario-header button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #e0e0e0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .calendario-header button:active {
            background: rgba(108, 92, 231, 0.3);
            border-color: #6c5ce7;
        }
        .calendario-titulo {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e0e0e0;
            text-align: center;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 12px;
            transition: background 0.2s;
        }
        .calendario-titulo:hover {
            background: rgba(255,255,255,0.05);
        }
        .calendario-dias-semana {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 6px;
        }
        .calendario-dias-semana span {
            text-align: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: #888;
            padding: 4px 0;
        }
        .calendario-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendario-dia {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            color: #ccc;
        }
        .calendario-dia:hover {
            background: rgba(108, 92, 231, 0.1);
        }
        .calendario-dia.outro-mes {
            color: #444;
            pointer-events: none;
        }
        .calendario-dia.hoje {
            background: rgba(108, 92, 231, 0.25);
            color: #a29bfe;
            font-weight: 700;
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.15);
        }
        .calendario-dia.selecionado {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe) !important;
            color: white !important;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.5);
        }
        .calendario-dia.tem-lancamento::after {
            content: '';
            position: absolute;
            bottom: 3px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #a29bfe;
            box-shadow: 0 0 6px rgba(108, 92, 231, 0.5);
        }
        .calendario-dia.selecionado.tem-lancamento::after {
            background: white;
        }
        
        .info-dia-selecionado {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .data-selecionada {
            font-weight: 600;
            color: #a29bfe;
            font-size: 0.85rem;
        }
        .resumo-dia {
            display: flex;
            gap: 14px;
            font-size: 0.78rem;
        }
        .resumo-dia span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .resumo-dia .positivo { color: #00e676; }
        .resumo-dia .negativo { color: #ff6b6b; }
        
        footer {
            text-align: center;
            margin-top: 5px;
            color: #666;
            font-size: 0.75rem;
            opacity: 0.8;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>
    <!-- Background animado -->
    <div class="bg-animado"></div>
    <div class="particula" style="width: 100px; height: 100px; top: 10%; left: 5%;"></div>
    <div class="particula" style="width: 150px; height: 150px; top: 50%; right: 10%; animation-delay: -3s; background: rgba(0, 230, 118, 0.08);"></div>
    <div class="particula" style="width: 80px; height: 80px; bottom: 20%; left: 15%; animation-delay: -5s; background: rgba(255, 107, 107, 0.06);"></div>
    <div class="particula" style="width: 120px; height: 120px; top: 30%; right: 5%; animation-delay: -7s; background: rgba(162, 155, 254, 0.07);"></div>
    
    <div class="app">
        <h1>💰 JB Financeiro</h1>

        <!-- Cards Resumo -->
        <div class="cards">
            <div class="card receita">
                <h3>Receitas</h3>
                <div class="valor" id="totalReceitas">R$ 0,00</div>
            </div>
            <div class="card despesa">
                <h3>Despesas</h3>
                <div class="valor" id="totalDespesas">R$ 0,00</div>
            </div>
            <div class="card compra">
                <h3>Compras</h3>
                <div class="valor" id="totalCompras">R$ 0,00</div>
            </div>
            <div class="card saldo">
                <h3>Saldo Líquido</h3>
                <div class="valor" id="saldoLiquido">R$ 0,00</div>
            </div>
        </div>

        <!-- Formulário expansível -->
        <div class="form-card" id="formCard">
            <div class="form-header" onclick="toggleFormulario()">
                <div class="icon-toggle">+</div> Nova Transação
            </div>
            <div class="form-body">
                <div class="input-row">
                    <div class="input-group">
                        <label>Data</label>
                        <input type="date" id="data">
                    </div>
                    <div class="two-cols">
                        <div class="input-group">
                            <label>Tipo</label>
                            <select id="tipo">
                                <option value="Receita">Receita</option>
                                <option value="Compra">Compra</option>
                                <option value="Despesa">Despesa</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Categoria</label>
                            <input type="text" id="categoria" placeholder="Ex: Vendas, Aluguel...">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Descrição</label>
                        <input type="text" id="descricao" placeholder="Detalhes da transação">
                    </div>
                    <div class="two-cols">
                        <div class="input-group">
                            <label>Valor R$</label>
                            <input type="number" id="valor" step="0.01" min="0.01" placeholder="0,00">
                        </div>
                        <div class="input-group">
                            <label>Pagamento</label>
                            <select id="formaPagamento">
                                <option>PIX</option>
                                <option>Dinheiro</option>
                                <option>Cartão Crédito</option>
                                <option>Cartão Débito</option>
                                <option>Boleto</option>
                                <option>Transferência</option>
                            </select>
                        </div>
                    </div>
                    <div class="two-cols">
                        <div class="input-group">
                            <label>Status</label>
                            <select id="status">
                                <option>Pago/Recebido</option>
                                <option>Pendente</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Obs</label>
                            <input type="text" id="observacoes" placeholder="Opcional">
                        </div>
                    </div>
                    <button class="btn-add" onclick="adicionarTransacao()">✅ Adicionar</button>
                </div>
            </div>
        </div>

        <!-- Lista de transações ocultável -->
        <div class="lista-container aberto" id="listaContainer">
            <div class="lista-cabecalho" onclick="toggleLista()">
                <div class="lista-cabecalho-esquerda">
                    <div class="icon-lista">▶</div>
                    <span class="lista-titulo">Lançamentos do Dia</span>
                </div>
                <span class="lista-contador" id="listaContador">0</span>
            </div>
            <div class="lista-conteudo">
                <div class="filtros">
                    <select id="filtroTipo" onchange="renderizarLista()">
                        <option value="Todos">Todos</option>
                        <option value="Receita">Receitas</option>
                        <option value="Compra">Compras</option>
                        <option value="Despesa">Despesas</option>
                    </select>
                    <input type="text" id="filtroBusca" placeholder="Buscar..." oninput="renderizarLista()">
                </div>
                <div class="transacoes-lista" id="listaTransacoes">
                    <div class="sem-dados">Nenhum lançamento neste dia</div>
                </div>
            </div>
        </div>

        <!-- Calendário em baixo -->
        <div class="calendario-container">
            <div class="calendario-header">
                <button onclick="mudarMes(-1)" title="Mês anterior">◀</button>
                <div class="calendario-titulo" id="calendarioTitulo" onclick="irParaHoje()"></div>
                <button onclick="mudarMes(1)" title="Próximo mês">▶</button>
            </div>
            <div class="calendario-dias-semana">
                <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
            </div>
            <div class="calendario-grid" id="calendarioGrid"></div>
            <div class="info-dia-selecionado">
                <span class="data-selecionada" id="dataSelecionadaInfo"></span>
                <div class="resumo-dia">
                    <span class="positivo" id="resumoReceitasDia">+R$ 0,00</span>
                    <span class="negativo" id="resumoDespesasDia">-R$ 0,00</span>
                </div>
            </div>
        </div>
        
        <footer>✨ Seus dados ficam salvos no aparelho</footer>
    </div>

    <button class="btn-flutuante" onclick="toggleFormulario()" title="Nova transação">+</button>

    <script>
        // Gerador de ícones e manifest inline
        function gerarIconeBase64(tamanho, corFundo, corTexto) {
            const canvas = document.createElement('canvas');
            canvas.width = tamanho;
            canvas.height = tamanho;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(tamanho/2, tamanho/2, tamanho/2 - 4, 0, 2*Math.PI);
            ctx.fillStyle = corFundo;
            ctx.fill();
            ctx.fillStyle = corTexto;
            ctx.font = `bold ${tamanho*0.5}px "Inter"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('JB', tamanho/2, tamanho/2);
            return canvas.toDataURL('image/png');
        }

        const icon192 = gerarIconeBase64(192, '#6c5ce7', '#ffffff');
        const icon512 = gerarIconeBase64(512, '#6c5ce7', '#ffffff');

        const manifestData = {
            name: 'JB Financeiro',
            short_name: 'JB Financeiro',
            description: 'Gerencie compras, despesas e receitas',
            start_url: location.href,
            display: 'standalone',
            background_color: '#0a0a0a',
            theme_color: '#0a0a0a',
            icons: [
                { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
                { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
            ]
        };

        const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const linkManifest = document.createElement('link');
        linkManifest.rel = 'manifest';
        linkManifest.href = manifestURL;
        document.head.appendChild(linkManifest);

        // Service Worker inline
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'jb-financeiro-v8';
                const ASSETS = ['${location.href}'];
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS)));
                });
                self.addEventListener('activate', e => {
                    e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
                        if(resp.ok) {
                            const clone = resp.clone();
                            caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
                        }
                        return resp;
                    })));
                });
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            const swURL = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swURL, {scope: '/'})
                .then(() => console.log('SW registrado'))
                .catch(err => console.log('SW erro:', err));
        }

        // Variáveis globais
        const STORAGE_KEY = 'jb_financeiro_transacoes';
        const MESES = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 
                       'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        let transacoes = [];
        let dataAtual = new Date();
        let mesAtual = dataAtual.getMonth();
        let anoAtual = dataAtual.getFullYear();
        let diaSelecionado = new Date(dataAtual.getFullYear(), dataAtual.getMonth(), dataAtual.getDate());
        let dataSelecionadaStr = formatarDataISO(diaSelecionado);

        // Funções da lista ocultável
        function toggleLista() {
            const container = document.getElementById('listaContainer');
            container.classList.toggle('aberto');
        }

        function abrirLista() {
            const container = document.getElementById('listaContainer');
            if (!container.classList.contains('aberto')) {
                container.classList.add('aberto');
            }
        }

        // Funções do calendário
        function formatarDataISO(data) {
            const ano = data.getFullYear();
            const mes = String(data.getMonth() + 1).padStart(2, '0');
            const dia = String(data.getDate()).padStart(2, '0');
            return `${ano}-${mes}-${dia}`;
        }

        function diasComLancamentos() {
            const dias = new Set();
            transacoes.forEach(t => {
                if (t.data) {
                    const [ano, mes, dia] = t.data.split('-').map(Number);
                    if (ano === anoAtual && mes === (mesAtual + 1)) {
                        dias.add(dia);
                    }
                }
            });
            return dias;
        }

        function mudarMes(direcao) {
            mesAtual += direcao;
            if (mesAtual < 0) {
                mesAtual = 11;
                anoAtual--;
            } else if (mesAtual > 11) {
                mesAtual = 0;
                anoAtual++;
            }
            renderizarCalendario();
        }

        function selecionarDia(ano, mes, dia) {
            diaSelecionado = new Date(ano, mes, dia);
            dataSelecionadaStr = formatarDataISO(diaSelecionado);
            document.getElementById('data').value = dataSelecionadaStr;
            renderizarCalendario();
            renderizarLista();
            atualizarResumoDia();
            abrirLista();
            document.getElementById('listaContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function irParaHoje() {
            const hoje = new Date();
            mesAtual = hoje.getMonth();
            anoAtual = hoje.getFullYear();
            diaSelecionado = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
            dataSelecionadaStr = formatarDataISO(diaSelecionado);
            document.getElementById('data').value = dataSelecionadaStr;
            renderizarCalendario();
            renderizarLista();
            atualizarResumoDia();
            abrirLista();
            document.getElementById('listaContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function atualizarResumoDia() {
            let receitasDia = 0;
            let despesasDia = 0;
            transacoes.forEach(t => {
                if (t.data === dataSelecionadaStr) {
                    if (t.tipo === 'Receita') receitasDia += t.valor;
                    else if (t.tipo === 'Compra' || t.tipo === 'Despesa') despesasDia += t.valor;
                }
            });
            document.getElementById('resumoReceitasDia').textContent = '+' + formatMoeda(receitasDia);
            document.getElementById('resumoDespesasDia').textContent = '-' + formatMoeda(despesasDia);
        }

        function renderizarCalendario() {
            document.getElementById('calendarioTitulo').textContent = `${MESES[mesAtual]} ${anoAtual}`;
            document.getElementById('dataSelecionadaInfo').textContent = 
                `📅 ${diaSelecionado.getDate()} de ${MESES[diaSelecionado.getMonth()]} de ${diaSelecionado.getFullYear()}`;

            const grid = document.getElementById('calendarioGrid');
            const primeiroDia = new Date(anoAtual, mesAtual, 1).getDay();
            const ultimoDia = new Date(anoAtual, mesAtual + 1, 0).getDate();
            const ultimoDiaMesAnterior = new Date(anoAtual, mesAtual, 0).getDate();
            
            const diasComLanc = diasComLancamentos();
            const hoje = new Date();
            const hojeStr = formatarDataISO(hoje);
            
            let html = '';
            
            for (let i = primeiroDia - 1; i >= 0; i--) {
                const dia = ultimoDiaMesAnterior - i;
                html += `<div class="calendario-dia outro-mes">${dia}</div>`;
            }
            
            for (let dia = 1; dia <= ultimoDia; dia++) {
                const dataDia = new Date(anoAtual, mesAtual, dia);
                const dataDiaStr = formatarDataISO(dataDia);
                
                let classes = ['calendario-dia'];
                if (dataDiaStr === hojeStr) classes.push('hoje');
                if (dataDiaStr === dataSelecionadaStr) classes.push('selecionado');
                if (diasComLanc.has(dia)) classes.push('tem-lancamento');
                
                html += `<div class="${classes.join(' ')}" onclick="selecionarDia(${anoAtual}, ${mesAtual}, ${dia})">${dia}</div>`;
            }
            
            const totalDiasMostrados = primeiroDia + ultimoDia;
            const diasRestantes = totalDiasMostrados % 7 === 0 ? 0 : 7 - (totalDiasMostrados % 7);
            for (let dia = 1; dia <= diasRestantes; dia++) {
                html += `<div class="calendario-dia outro-mes">${dia}</div>`;
            }
            
            grid.innerHTML = html;
        }

        // Lógica do formulário expansível
        function toggleFormulario() {
            const card = document.getElementById('formCard');
            const icon = card.querySelector('.icon-toggle');
            if (card.classList.contains('aberto')) {
                card.classList.remove('aberto');
                icon.textContent = '+';
            } else {
                card.classList.add('aberto');
                icon.textContent = '−';
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // Lógica financeira
        function carregar() {
            const dados = localStorage.getItem(STORAGE_KEY);
            transacoes = dados ? JSON.parse(dados) : [];
            salvar();
        }

        function salvar() { localStorage.setItem(STORAGE_KEY, JSON.stringify(transacoes)); }

        function totais() {
            let r=0, c=0, d=0;
            transacoes.forEach(t => {
                if(t.tipo === 'Receita') r += t.valor;
                else if(t.tipo === 'Compra') c += t.valor;
                else if(t.tipo === 'Despesa') d += t.valor;
            });
            return { r, c, d, saldo: r - c - d };
        }

        function formatMoeda(v) { return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }

        function atualizarDashboard() {
            const {r, c, d, saldo} = totais();
            document.getElementById('totalReceitas').textContent = formatMoeda(r);
            document.getElementById('totalCompras').textContent = formatMoeda(c);
            document.getElementById('totalDespesas').textContent = formatMoeda(d);
            document.getElementById('saldoLiquido').textContent = formatMoeda(saldo);
        }

        function adicionarTransacao() {
            const data = document.getElementById('data').value;
            const tipo = document.getElementById('tipo').value;
            const categoria = document.getElementById('categoria').value.trim();
            const descricao = document.getElementById('descricao').value.trim();
            const valor = parseFloat(document.getElementById('valor').value);
            const formaPagamento = document.getElementById('formaPagamento').value;
            const status = document.getElementById('status').value;
            const observacoes = document.getElementById('observacoes').value.trim();

            if(!data || !categoria || !descricao || isNaN(valor) || valor <= 0) {
                alert('Preencha todos os campos obrigatórios.');
                return;
            }
            transacoes.push({data, tipo, categoria, descricao, valor, formaPagamento, status, observacoes});
            salvar();
            limparForm();
            
            const [ano, mes, dia] = data.split('-').map(Number);
            dataSelecionadaStr = data;
            diaSelecionado = new Date(ano, mes - 1, dia);
            mesAtual = mes - 1;
            anoAtual = ano;
            
            renderizarCalendario();
            renderizarLista();
            atualizarDashboard();
            atualizarResumoDia();
            abrirLista();
            
            const card = document.getElementById('formCard');
            if (card.classList.contains('aberto')) {
                toggleFormulario();
            }
        }

        function limparForm() {
            document.getElementById('categoria').value = '';
            document.getElementById('descricao').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('observacoes').value = '';
        }

        function excluir(index) {
            if(confirm('Excluir transação?')) {
                transacoes.splice(index, 1);
                salvar();
                renderizarCalendario();
                renderizarLista();
                atualizarDashboard();
                atualizarResumoDia();
            }
        }

        function renderizarLista() {
            const filtroTipo = document.getElementById('filtroTipo').value;
            const busca = document.getElementById('filtroBusca').value.toLowerCase();
            const container = document.getElementById('listaTransacoes');
            const contador = document.getElementById('listaContador');

            let filtradas = transacoes.filter(t => {
                const dataOk = t.data === dataSelecionadaStr;
                const tipoOk = filtroTipo === 'Todos' || t.tipo === filtroTipo;
                const buscaOk = t.descricao.toLowerCase().includes(busca) || t.categoria.toLowerCase().includes(busca);
                return dataOk && tipoOk && buscaOk;
            });

            contador.textContent = filtradas.length;

            if(filtradas.length === 0) {
                container.innerHTML = '<div class="sem-dados">Nenhum lançamento neste dia</div>';
                return;
            }

            filtradas.sort((a,b) => b.valor - a.valor);
            let html = '';
            filtradas.forEach(t => {
                const idx = transacoes.indexOf(t);
                const corValor = t.tipo === 'Receita' ? '#00e676' : (t.tipo === 'Compra' ? '#ff6b6b' : '#ff5252');
                const sinal = t.tipo === 'Receita' ? '+' : '-';
                html += `
                    <div class="transacao-item">
                        <div class="transacao-info">
                            <div class="transacao-desc">${t.descricao}</div>
                            <div class="transacao-meta">
                                <span>${t.categoria}</span>
                                <span>${t.formaPagamento}</span>
                                <span>${t.status}</span>
                            </div>
                        </div>
                        <div class="transacao-valor" style="color:${corValor}">
                            ${sinal}${formatMoeda(t.valor)}
                        </div>
                        <div class="transacao-actions">
                            <button onclick="excluir(${idx})" title="Excluir">🗑️</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.onload = () => {
            carregar();
            document.getElementById('data').value = dataSelecionadaStr;
            renderizarCalendario();
            renderizarLista();
            atualizarDashboard();
            atualizarResumoDia();
        };
    </script>
</body>
</html>
