<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JB Financeiro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JB Financeiro">
    <meta name="theme-color" content="#0a0a0f">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0a0f;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 230, 118, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(138, 43, 226, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 180, 216, 0.05) 0%, transparent 70%);
            color: #e0e0e0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-attachment: fixed;
        }

        .app {
            width: 100%;
            max-width: 480px;
            padding: 20px 14px 40px;
            position: relative;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 180, 148, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .header-date {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s;
        }
        .header-date:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
        }

        /* Saldo Principal */
        .saldo-principal {
            background: linear-gradient(145deg, #00b894, #00e676);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            color: #000;
            box-shadow: 0 15px 40px rgba(0, 180, 148, 0.3);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .saldo-principal::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            top: -40px;
            right: -30px;
        }
        .saldo-principal::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            bottom: -20px;
            left: 20px;
        }
        .saldo-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            opacity: 0.8;
            position: relative;
            z-index: 1;
        }
        .saldo-valor {
            font-size: 2.4rem;
            font-weight: 800;
            margin: 6px 0 2px;
            position: relative;
            z-index: 1;
            letter-spacing: -1px;
        }
        .saldo-variacao {
            font-size: 0.78rem;
            font-weight: 500;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        /* Mini Cards */
        .mini-cards {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .mini-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 14px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .mini-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .mini-card:active { transform: scale(0.96); }
        .mini-card-icon {
            font-size: 1.5rem;
            margin-bottom: 6px;
        }
        .mini-card-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .mini-card-valor {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .mini-card.receita .mini-card-valor { color: #00e676; }
        .mini-card.despesa .mini-card-valor { color: #ff6b6b; }
        .mini-card.compra .mini-card-valor { color: #ffa502; }

        /* Botão Adicionar */
        .btn-adicionar {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(255,255,255,0.2);
            color: #aaa;
            padding: 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .btn-adicionar:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(0,230,118,0.5);
            color: #00e676;
        }
        .btn-adicionar:active { transform: scale(0.98); }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.ativo {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-sheet {
            background: #1a1a25;
            width: 100%;
            max-width: 480px;
            border-radius: 28px 28px 0 0;
            padding: 10px 16px 30px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.08);
            border-bottom: none;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .modal-handle {
            width: 36px;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin: 8px auto 16px;
        }
        .modal-titulo {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 16px;
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
        }
        .input-group label {
            font-size: 0.72rem;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .input-group input, .input-group select {
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 0.9rem;
            width: 100%;
            background: rgba(255,255,255,0.04);
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: #00b894;
            box-shadow: 0 0 15px rgba(0,180,148,0.2);
        }
        .input-group input::placeholder { color: #666; }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn-salvar {
            width: 100%;
            background: linear-gradient(135deg, #00b894, #00e676);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0,180,148,0.3);
        }
        .btn-salvar:hover {
            box-shadow: 0 12px 35px rgba(0,180,148,0.5);
            transform: translateY(-1px);
        }
        .btn-salvar:active { transform: scale(0.98); }

        /* Lista de Lançamentos */
        .lista-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .lista-cabecalho {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .lista-cabecalho:hover { background: rgba(255,255,255,0.03); }
        .lista-titulo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .lista-seta {
            transition: transform 0.3s ease;
            font-size: 0.8rem;
            color: #888;
        }
        .lista-container.aberto .lista-seta {
            transform: rotate(90deg);
        }
        .lista-titulo {
            font-weight: 600;
            color: #ddd;
            font-size: 0.88rem;
        }
        .lista-badge {
            background: rgba(255,255,255,0.08);
            color: #aaa;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .lista-conteudo {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .lista-container.aberto .lista-conteudo { display: block; }
        .filtros {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .filtros select, .filtros input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.78rem;
            background: rgba(255,255,255,0.03);
            color: #ccc;
            outline: none;
        }
        .filtros select:focus, .filtros input:focus {
            border-color: #00b894;
        }
        .transacoes-lista {
            max-height: 280px;
            overflow-y: auto;
        }
        .transacao-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            gap: 10px;
            transition: background 0.2s;
        }
        .transacao-item:active { background: rgba(255,255,255,0.03); }
        .transacao-item:last-child { border-bottom: none; }
        .transacao-icone {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .transacao-icone.receita { background: rgba(0,230,118,0.15); }
        .transacao-icone.despesa { background: rgba(255,107,107,0.15); }
        .transacao-icone.compra { background: rgba(255,165,2,0.15); }
        .transacao-info { flex: 1; min-width: 0; }
        .transacao-desc {
            font-weight: 500;
            color: #ddd;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .transacao-meta {
            font-size: 0.7rem;
            color: #888;
            display: flex;
            gap: 6px;
            margin-top: 2px;
        }
        .transacao-valor {
            font-weight: 700;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .transacao-del {
            background: none;
            border: none;
            color: #ff6b6b;
            opacity: 0.5;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px;
            transition: opacity 0.2s;
        }
        .transacao-del:hover { opacity: 1; }
        .sem-dados {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.85rem;
        }

        /* Calendário */
        .calendario-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .calendario-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .calendario-header button {
            background: none;
            border: none;
            color: #aaa;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .calendario-header button:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .calendario-titulo {
            font-size: 0.88rem;
            font-weight: 600;
            color: #ddd;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .calendario-titulo:hover { background: rgba(255,255,255,0.05); }
        .calendario-dias-semana {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 4px;
        }
        .calendario-dias-semana span {
            text-align: center;
            font-size: 0.65rem;
            font-weight: 600;
            color: #666;
            padding: 4px 0;
        }
        .calendario-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .calendario-dia {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            color: #aaa;
        }
        .calendario-dia:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .calendario-dia.outro-mes { color: #444; pointer-events: none; }
        .calendario-dia.hoje {
            background: rgba(0,230,118,0.15);
            color: #00e676;
            font-weight: 700;
        }
        .calendario-dia.selecionado {
            background: #00b894;
            color: #000 !important;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,180,148,0.4);
        }
        .calendario-dia.tem-lancamento::after {
            content: '';
            position: absolute;
            bottom: 2px;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #00e676;
        }
        .calendario-dia.selecionado.tem-lancamento::after { background: #000; }

        /* Calculadora (ocultável) */
        .calculadora-wrapper {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 70px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .calc-cabecalho {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .calc-cabecalho:hover { background: rgba(255,255,255,0.03); }
        .calc-cabecalho-esquerda {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .calc-seta {
            transition: transform 0.3s ease;
            font-size: 0.8rem;
            color: #888;
        }
        .calculadora-wrapper.aberto .calc-seta {
            transform: rotate(90deg);
        }
        .calc-cabecalho-titulo {
            font-weight: 600;
            color: #ddd;
            font-size: 0.88rem;
        }
        .calc-conteudo {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 14px 14px 16px;
        }
        .calculadora-wrapper.aberto .calc-conteudo {
            display: block;
        }
        .calc-display {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 10px 12px;
            text-align: right;
            margin-bottom: 10px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        .calc-display-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            word-break: break-all;
            line-height: 1.2;
        }
        .calc-botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .calc-btn {
            aspect-ratio: 1;
            border-radius: 12px;
            border: none;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            background: rgba(255,255,255,0.06);
            color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            min-width: 0;
        }
        .calc-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.12);
        }
        .calc-btn.operador {
            background: rgba(0,180,148,0.15);
            color: #00b894;
            font-weight: 600;
        }
        .calc-btn.operador:active {
            background: rgba(0,180,148,0.3);
        }
        .calc-btn.igual {
            background: linear-gradient(135deg, #00b894, #00e676);
            color: #000;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,180,148,0.3);
        }
        .calc-btn.igual:active {
            box-shadow: 0 2px 5px rgba(0,180,148,0.5);
        }
        .calc-btn.zero {
            grid-column: span 2;
            aspect-ratio: auto;
            height: auto;
        }

        footer {
            text-align: center;
            color: #555;
            font-size: 0.7rem;
            margin-top: 10px;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">
                    <img src="https://i.im.ge/QMS05xJ/Captura_de_tela_9-5-2026_164013_im.ge.jpg" alt="JB Financeiro Logo">
                </div>
                <span class="logo-text">JB Financeiro</span>
            </div>
            <div class="header-date" onclick="irParaHoje()" id="headerDate"></div>
        </div>

        <!-- Saldo Principal -->
        <div class="saldo-principal">
            <div class="saldo-label">Saldo Líquido</div>
            <div class="saldo-valor" id="saldoLiquido">R$ 0,00</div>
            <div class="saldo-variacao" id="variacaoTexto">Nenhum lançamento ainda</div>
        </div>

        <!-- Mini Cards -->
        <div class="mini-cards">
            <div class="mini-card receita" onclick="filtrarPorTipo('Receita')">
                <div class="mini-card-icon">📥</div>
                <div class="mini-card-label">Receitas</div>
                <div class="mini-card-valor" id="totalReceitas">R$ 0,00</div>
            </div>
            <div class="mini-card despesa" onclick="filtrarPorTipo('Despesa')">
                <div class="mini-card-icon">📤</div>
                <div class="mini-card-label">Despesas</div>
                <div class="mini-card-valor" id="totalDespesas">R$ 0,00</div>
            </div>
            <div class="mini-card compra" onclick="filtrarPorTipo('Compra')">
                <div class="mini-card-icon">🛒</div>
                <div class="mini-card-label">Compras</div>
                <div class="mini-card-valor" id="totalCompras">R$ 0,00</div>
            </div>
        </div>

        <!-- Botão Adicionar -->
        <button class="btn-adicionar" onclick="abrirModal()">
            <span>+</span> Nova Transação
        </button>

        <!-- Lista de Lançamentos -->
        <div class="lista-container aberto" id="listaContainer">
            <div class="lista-cabecalho" onclick="toggleLista()">
                <div class="lista-titulo-area">
                    <span class="lista-seta">▶</span>
                    <span class="lista-titulo">Lançamentos do Dia</span>
                </div>
                <span class="lista-badge" id="listaContador">0</span>
            </div>
            <div class="lista-conteudo">
                <div class="filtros">
                    <select id="filtroTipo" onchange="renderizarLista()">
                        <option value="Todos">Todos</option>
                        <option value="Receita">Receitas</option>
                        <option value="Compra">Compras</option>
                        <option value="Despesa">Despesas</option>
                    </select>
                    <input type="text" id="filtroBusca" placeholder="Buscar..." oninput="renderizarLista()">
                </div>
                <div class="transacoes-lista" id="listaTransacoes">
                    <div class="sem-dados">Nenhum lançamento neste dia</div>
                </div>
            </div>
        </div>

        <!-- Calendário -->
        <div class="calendario-container">
            <div class="calendario-header">
                <button onclick="mudarMes(-1)">◀</button>
                <div class="calendario-titulo" id="calendarioTitulo" onclick="irParaHoje()"></div>
                <button onclick="mudarMes(1)">▶</button>
            </div>
            <div class="calendario-dias-semana">
                <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
            </div>
            <div class="calendario-grid" id="calendarioGrid"></div>
        </div>

        <!-- Calculadora Ocultável -->
        <div class="calculadora-wrapper" id="calcWrapper">
            <div class="calc-cabecalho" onclick="toggleCalculadora()">
                <div class="calc-cabecalho-esquerda">
                    <span class="calc-seta">▶</span>
                    <span class="calc-cabecalho-titulo">🧮 Calculadora</span>
                </div>
            </div>
            <div class="calc-conteudo">
                <div class="calc-display">
                    <div class="calc-display-text" id="calcDisplay">0</div>
                </div>
                <div class="calc-botoes">
                    <button class="calc-btn operador" onclick="calcClear()">C</button>
                    <button class="calc-btn operador" onclick="calcAppend('(')">(</button>
                    <button class="calc-btn operador" onclick="calcAppend(')')">)</button>
                    <button class="calc-btn operador" onclick="calcAppend('/')">÷</button>
                    
                    <button class="calc-btn" onclick="calcAppend('7')">7</button>
                    <button class="calc-btn" onclick="calcAppend('8')">8</button>
                    <button class="calc-btn" onclick="calcAppend('9')">9</button>
                    <button class="calc-btn operador" onclick="calcAppend('*')">×</button>
                    
                    <button class="calc-btn" onclick="calcAppend('4')">4</button>
                    <button class="calc-btn" onclick="calcAppend('5')">5</button>
                    <button class="calc-btn" onclick="calcAppend('6')">6</button>
                    <button class="calc-btn operador" onclick="calcAppend('-')">−</button>
                    
                    <button class="calc-btn" onclick="calcAppend('1')">1</button>
                    <button class="calc-btn" onclick="calcAppend('2')">2</button>
                    <button class="calc-btn" onclick="calcAppend('3')">3</button>
                    <button class="calc-btn operador" onclick="calcAppend('+')">+</button>
                    
                    <button class="calc-btn zero" onclick="calcAppend('0')">0</button>
                    <button class="calc-btn" onclick="calcAppend('.')">.</button>
                    <button class="calc-btn igual" onclick="calcCalcular()">=</button>
                </div>
            </div>
        </div>

        <footer>✨ Seus dados ficam salvos no aparelho</footer>
    </div>

    <!-- Modal (Sheet) -->
    <div class="modal-overlay" id="modalOverlay" onclick="fecharModal(event)">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <div class="modal-titulo">Nova Transação</div>
            <div class="input-group">
                <label>Data</label>
                <input type="date" id="data">
            </div>
            <div class="row-2">
                <div class="input-group">
                    <label>Tipo</label>
                    <select id="tipo">
                        <option value="Receita">Receita</option>
                        <option value="Compra">Compra</option>
                        <option value="Despesa">Despesa</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Categoria</label>
                    <input type="text" id="categoria" placeholder="Ex: Vendas, Aluguel...">
                </div>
            </div>
            <div class="input-group">
                <label>Descrição</label>
                <input type="text" id="descricao" placeholder="Detalhes da transação">
            </div>
            <div class="row-2">
                <div class="input-group">
                    <label>Valor R$</label>
                    <input type="number" id="valor" step="0.01" min="0.01" placeholder="0,00">
                </div>
                <div class="input-group">
                    <label>Pagamento</label>
                    <select id="formaPagamento">
                        <option>PIX</option>
                        <option>Dinheiro</option>
                        <option>Cartão Crédito</option>
                        <option>Cartão Débito</option>
                        <option>Boleto</option>
                        <option>Transferência</option>
                    </select>
                </div>
            </div>
            <div class="row-2">
                <div class="input-group">
                    <label>Status</label>
                    <select id="status">
                        <option>Pago/Recebido</option>
                        <option>Pendente</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Obs</label>
                    <input type="text" id="observacoes" placeholder="Opcional">
                </div>
            </div>
            <button class="btn-salvar" onclick="adicionarTransacao()">✅ Salvar Transação</button>
        </div>
    </div>

    <script>
        // ==================== GERADOR DE ÍCONES E MANIFEST INLINE ====================
        function gerarIconeBase64(tamanho, corFundo, corTexto) {
            const canvas = document.createElement('canvas');
            canvas.width = tamanho;
            canvas.height = tamanho;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(tamanho/2, tamanho/2, tamanho/2 - 4, 0, 2*Math.PI);
            ctx.fillStyle = corFundo;
            ctx.fill();
            ctx.fillStyle = corTexto;
            ctx.font = `bold ${tamanho*0.5}px "Inter"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('JB', tamanho/2, tamanho/2);
            return canvas.toDataURL('image/png');
        }

        const icon192 = gerarIconeBase64(192, '#00b894', '#000000');
        const icon512 = gerarIconeBase64(512, '#00b894', '#000000');

        const manifestData = {
            name: 'JB Financeiro',
            short_name: 'JB Financeiro',
            start_url: location.href,
            display: 'standalone',
            background_color: '#0a0a0f',
            theme_color: '#0a0a0f',
            icons: [
                { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
                { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
            ]
        };

        const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const linkManifest = document.createElement('link');
        linkManifest.rel = 'manifest';
        linkManifest.href = manifestURL;
        document.head.appendChild(linkManifest);

        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'jb-financeiro-v13';
                const ASSETS = ['${location.href}'];
                self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS))); });
                self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k))))); });
                self.addEventListener('fetch', e => { e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))); });
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(swBlob), {scope: '/'});
        }

        // ==================== VARIÁVEIS ====================
        const STORAGE_KEY = 'jb_financeiro_transacoes';
        const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        let transacoes = [];
        let mesAtual = new Date().getMonth();
        let anoAtual = new Date().getFullYear();
        let diaSelecionado = new Date();
        let dataSelecionadaStr = formatarDataISO(diaSelecionado);

        // ==================== MODAL ====================
        function abrirModal() {
            document.getElementById('modalOverlay').classList.add('ativo');
            document.getElementById('data').value = dataSelecionadaStr;
        }
        function fecharModal(e) {
            if (!e || e.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').classList.remove('ativo');
            }
        }

        // ==================== LISTA ====================
        function toggleLista() {
            document.getElementById('listaContainer').classList.toggle('aberto');
        }
        function abrirLista() {
            document.getElementById('listaContainer').classList.add('aberto');
        }

        // ==================== CALCULADORA ====================
        function toggleCalculadora() {
            document.getElementById('calcWrapper').classList.toggle('aberto');
        }

        let calcExpression = '';
        const calcDisplay = document.getElementById('calcDisplay');

        function calcAppend(value) {
            let val = value;
            if (value === '×') val = '*';
            if (value === '÷') val = '/';
            if (value === '−') val = '-';
            calcExpression += val;
            calcDisplay.textContent = calcExpression.replace(/\*/g, '×').replace(/\//g, '÷');
        }

        function calcClear() {
            calcExpression = '';
            calcDisplay.textContent = '0';
        }

        function calcCalcular() {
            try {
                let expr = calcExpression.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                const result = Function('"use strict"; return (' + expr + ')')();
                if (result === undefined || isNaN(result) || !isFinite(result)) {
                    calcDisplay.textContent = 'Erro';
                    calcExpression = '';
                } else {
                    let formatted = Number(result).toLocaleString('pt-BR', { maximumFractionDigits: 10 });
                    calcDisplay.textContent = formatted;
                    calcExpression = result.toString();
                }
            } catch (e) {
                calcDisplay.textContent = 'Erro';
                calcExpression = '';
            }
        }

        // ==================== CALENDÁRIO ====================
        function formatarDataISO(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function diasComLancamentos() {
            const dias = new Set();
            transacoes.forEach(t => {
                if(t.data) {
                    const [a,m,d] = t.data.split('-').map(Number);
                    if(a === anoAtual && m === (mesAtual+1)) dias.add(d);
                }
            });
            return dias;
        }
        function mudarMes(dir) {
            mesAtual += dir;
            if(mesAtual < 0) { mesAtual = 11; anoAtual--; }
            else if(mesAtual > 11) { mesAtual = 0; anoAtual++; }
            renderizarCalendario();
        }
        function selecionarDia(ano, mes, dia) {
            diaSelecionado = new Date(ano, mes, dia);
            dataSelecionadaStr = formatarDataISO(diaSelecionado);
            document.getElementById('data').value = dataSelecionadaStr;
            renderizarCalendario();
            renderizarLista();
            abrirLista();
            document.getElementById('listaContainer').scrollIntoView({ behavior: 'smooth' });
        }
        function irParaHoje() {
            const h = new Date();
            mesAtual = h.getMonth();
            anoAtual = h.getFullYear();
            diaSelecionado = h;
            dataSelecionadaStr = formatarDataISO(h);
            document.getElementById('data').value = dataSelecionadaStr;
            renderizarCalendario();
            renderizarLista();
            abrirLista();
            document.getElementById('listaContainer').scrollIntoView({ behavior: 'smooth' });
        }
        function renderizarCalendario() {
            document.getElementById('calendarioTitulo').textContent = `${MESES[mesAtual]} ${anoAtual}`;
            document.getElementById('headerDate').textContent = `${String(diaSelecionado.getDate()).padStart(2,'0')}/${String(diaSelecionado.getMonth()+1).padStart(2,'0')}/${diaSelecionado.getFullYear()}`;
            const grid = document.getElementById('calendarioGrid');
            const primeiroDia = new Date(anoAtual, mesAtual, 1).getDay();
            const ultimoDia = new Date(anoAtual, mesAtual+1, 0).getDate();
            const ultimoAnterior = new Date(anoAtual, mesAtual, 0).getDate();
            const diasComLanc = diasComLancamentos();
            const hojeStr = formatarDataISO(new Date());
            let html = '';
            for(let i = primeiroDia-1; i >= 0; i--) html += `<div class="calendario-dia outro-mes">${ultimoAnterior-i}</div>`;
            for(let d = 1; d <= ultimoDia; d++) {
                const dataStr = `${anoAtual}-${String(mesAtual+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let cls = ['calendario-dia'];
                if(dataStr === hojeStr) cls.push('hoje');
                if(dataStr === dataSelecionadaStr) cls.push('selecionado');
                if(diasComLanc.has(d)) cls.push('tem-lancamento');
                html += `<div class="${cls.join(' ')}" onclick="selecionarDia(${anoAtual},${mesAtual},${d})">${d}</div>`;
            }
            const resto = (primeiroDia+ultimoDia) % 7;
            for(let d = 1; d <= (resto ? 7-resto : 0); d++) html += `<div class="calendario-dia outro-mes">${d}</div>`;
            grid.innerHTML = html;
        }

        // ==================== FILTRAR POR TIPO ====================
        function filtrarPorTipo(tipo) {
            document.getElementById('filtroTipo').value = tipo;
            renderizarLista();
            abrirLista();
            document.getElementById('listaContainer').scrollIntoView({ behavior: 'smooth' });
        }

        // ==================== FINANCEIRO ====================
        function carregar() {
            const dados = localStorage.getItem(STORAGE_KEY);
            transacoes = dados ? JSON.parse(dados) : [];
        }
        function salvar() { localStorage.setItem(STORAGE_KEY, JSON.stringify(transacoes)); }
        function totais() {
            let r=0,c=0,d=0;
            transacoes.forEach(t => {
                if(t.tipo==='Receita') r+=t.valor;
                else if(t.tipo==='Compra') c+=t.valor;
                else d+=t.valor;
            });
            return {r,c,d,saldo:r-c-d};
        }
        function formatMoeda(v) { return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
        function atualizarDashboard() {
            const {r,c,d,saldo} = totais();
            document.getElementById('totalReceitas').textContent = formatMoeda(r);
            document.getElementById('totalCompras').textContent = formatMoeda(c);
            document.getElementById('totalDespesas').textContent = formatMoeda(d);
            document.getElementById('saldoLiquido').textContent = formatMoeda(saldo);
            const qtd = transacoes.length;
            document.getElementById('variacaoTexto').textContent = qtd === 0 ? 'Nenhum lançamento ainda' : `${qtd} lançamento${qtd>1?'s':''} no total`;
        }
        function adicionarTransacao() {
            const data = document.getElementById('data').value;
            const tipo = document.getElementById('tipo').value;
            const categoria = document.getElementById('categoria').value.trim();
            const descricao = document.getElementById('descricao').value.trim();
            const valor = parseFloat(document.getElementById('valor').value);
            const formaPagamento = document.getElementById('formaPagamento').value;
            const status = document.getElementById('status').value;
            const observacoes = document.getElementById('observacoes').value.trim();
            if(!data||!categoria||!descricao||isNaN(valor)||valor<=0) { alert('Preencha todos os campos obrigatórios.'); return; }
            transacoes.push({data,tipo,categoria,descricao,valor,formaPagamento,status,observacoes});
            salvar();
            document.getElementById('categoria').value='';
            document.getElementById('descricao').value='';
            document.getElementById('valor').value='';
            document.getElementById('observacoes').value='';
            const [a,m,d] = data.split('-').map(Number);
            diaSelecionado = new Date(a,m-1,d);
            dataSelecionadaStr = data;
            mesAtual = m-1;
            anoAtual = a;
            renderizarCalendario();
            renderizarLista();
            atualizarDashboard();
            abrirLista();
            fecharModal();
        }
        function excluir(index) {
            if(confirm('Excluir transação?')) {
                transacoes.splice(index,1);
                salvar();
                renderizarCalendario();
                renderizarLista();
                atualizarDashboard();
            }
        }
        function renderizarLista() {
            const filtroTipo = document.getElementById('filtroTipo').value;
            const busca = document.getElementById('filtroBusca').value.toLowerCase();
            const container = document.getElementById('listaTransacoes');
            const contador = document.getElementById('listaContador');
            let filtradas = transacoes.filter(t => {
                return t.data === dataSelecionadaStr && (filtroTipo==='Todos'||t.tipo===filtroTipo) && (t.descricao.toLowerCase().includes(busca)||t.categoria.toLowerCase().includes(busca));
            });
            contador.textContent = filtradas.length;
            if(filtradas.length===0) {
                container.innerHTML = '<div class="sem-dados">Nenhum lançamento neste dia</div>';
                return;
            }
            filtradas.sort((a,b)=>b.valor-a.valor);
            let html = '';
            filtradas.forEach(t => {
                const idx = transacoes.indexOf(t);
                const cor = t.tipo==='Receita'?'#00e676':t.tipo==='Compra'?'#ffa502':'#ff6b6b';
                const sinal = t.tipo==='Receita'?'+':'-';
                const icone = t.tipo==='Receita'?'📥':t.tipo==='Compra'?'🛒':'📤';
                const clsIcone = t.tipo==='Receita'?'receita':t.tipo==='Compra'?'compra':'despesa';
                html += `
                    <div class="transacao-item">
                        <div class="transacao-icone ${clsIcone}">${icone}</div>
                        <div class="transacao-info">
                            <div class="transacao-desc">${t.descricao}</div>
                            <div class="transacao-meta">
                                <span>${t.categoria}</span>·<span>${t.formaPagamento}</span>
                            </div>
                        </div>
                        <div class="transacao-valor" style="color:${cor}">${sinal}${formatMoeda(t.valor)}</div>
                        <button class="transacao-del" onclick="excluir(${idx})">🗑</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.onload = () => {
            carregar();
            document.getElementById('data').value = dataSelecionadaStr;
            renderizarCalendario();
            renderizarLista();
            atualizarDashboard();
            document.getElementById('headerDate').textContent = `${String(diaSelecionado.getDate()).padStart(2,'0')}/${String(diaSelecionado.getMonth()+1).padStart(2,'0')}/${diaSelecionado.getFullYear()}`;
        };
    </script>
</body>
</html>
