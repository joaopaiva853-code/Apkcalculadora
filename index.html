  <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeoCalc Pro | Red & Black Edition</title>
    <style>
        :root {
            --bg-dark: #000000;
            --glass-bg: rgba(15, 5, 5, 0.8);
            --glass-border: rgba(255, 0, 0, 0.15);
            --neon-red: #ff3131;
            --dark-red: #8b0000;
            --text-main: #ffffff;
            --btn-bg: rgba(255, 255, 255, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--bg-dark);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            /* Gradiente animado em tons de preto e vermelho profundo */
            background: linear-gradient(-45deg, #000000, #1a0000, #330000, #000000);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-shell {
            width: 100%;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            padding-bottom: env(safe-area-inset-bottom);
            padding-top: env(safe-area-inset-top);
        }

        /* Painel de Vidro Negro */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 25px 60px -12px rgba(255, 0, 0, 0.15);
            
            width: 100%;
            max-width: 380px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: appEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes appEntry {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Relógio Digital Vermelho Neon */
        .digital-clock-container {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255, 0, 0, 0.1);
        }

        #clock {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--neon-red);
            text-shadow: 0 0 15px rgba(255, 49, 49, 0.6);
            letter-spacing: 2px;
        }

        /* Display da Calculadora */
        .display-area {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 28px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            min-height: 120px;
            border: 1px solid rgba(255, 0, 0, 0.05);
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.8);
        }

        .history {
            font-size: 1.1rem;
            color: #550000; /* Vermelho sangue escuro para o histórico */
            min-height: 26px;
            font-family: 'JetBrains Mono', monospace;
        }

        .main-number {
            font-size: 3rem;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            text-align: right;
            width: 100%;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        /* Grade de Botões */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            aspect-ratio: 1;
            border-radius: 22px;
            border: none;
            background: var(--btn-bg);
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        button:active {
            transform: scale(0.88);
            background: rgba(255, 0, 0, 0.15);
        }

        /* Botões de Operação e Especiais */
        .btn-op { 
            color: var(--neon-red); 
            background: rgba(255, 49, 49, 0.08); 
        }
        
        .btn-clear { 
            color: #ff0000; 
            background: rgba(255, 0, 0, 0.12);
            font-weight: bold;
        }
        
        .btn-equal {
            grid-column: span 2;
            aspect-ratio: auto;
            background: linear-gradient(135deg, #ff0000, #8b0000);
            color: white;
            font-weight: 700;
            box-shadow: 0 8px 20px -5px rgba(255, 0, 0, 0.4);
            border: none;
        }

        .btn-zero {
            grid-column: span 2;
            aspect-ratio: auto;
        }

        /* Responsividade para telas menores */
        @media (max-height: 700px) {
            .glass-panel { padding: 18px; gap: 12px; }
            .display-area { min-height: 90px; padding: 15px; }
            .main-number { font-size: 2.2rem; }
            button { border-radius: 16px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="glass-panel">
            <div class="digital-clock-container">
                <div id="clock">00:00:00</div>
            </div>

            <div class="display-area">
                <div class="history" id="history"></div>
                <div class="main-number" id="result">0</div>
            </div>

            <div class="keypad">
                <button class="btn-clear" onclick="clearAll()">AC</button>
                <button onclick="deleteLast()">⌫</button>
                <button class="btn-op" onclick="setOp('/')">÷</button>
                <button class="btn-op" onclick="setOp('*')">×</button>
                
                <button onclick="addNum('7')">7</button>
                <button onclick="addNum('8')">8</button>
                <button onclick="addNum('9')">9</button>
                <button class="btn-op" onclick="setOp('-')">−</button>
                
                <button onclick="addNum('4')">4</button>
                <button onclick="addNum('5')">5</button>
                <button onclick="addNum('6')">6</button>
                <button class="btn-op" onclick="setOp('+')">+</button>
                
                <button onclick="addNum('1')">1</button>
                <button onclick="addNum('2')">2</button>
                <button onclick="addNum('3')">3</button>
                <button class="btn-equal" onclick="calculate()">=</button>
                
                <button class="btn-zero" onclick="addNum('0')">0</button>
                <button onclick="addNum('.')">.</button>
            </div>
        </div>
    </div>

    <script>
        // --- RELÓGIO ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- LÓGICA DA CALCULADORA ---
        let currentInput = '0';
        let previousInput = '';
        let operation = null;
        const resultDisplay = document.getElementById('result');
        const historyDisplay = document.getElementById('history');

        function updateUI() {
            resultDisplay.textContent = currentInput;
            if (operation) {
                const opMap = {'/': '÷', '*': '×', '+': '+', '-': '−'};
                historyDisplay.textContent = `${previousInput} ${opMap[operation]}`;
            } else {
                historyDisplay.textContent = '';
            }
        }

        function addNum(num) {
            if (currentInput === '0' && num !== '.') {
                currentInput = num;
            } else {
                if (num === '.' && currentInput.includes('.')) return;
                if (currentInput.length < 12) currentInput += num;
            }
            updateUI();
        }

        function setOp(op) {
            if (currentInput === '0' && previousInput === '') return;
            if (previousInput !== '') calculate();
            operation = op;
            previousInput = currentInput;
            currentInput = '0';
            updateUI();
        }

        function clearAll() {
            currentInput = '0';
            previousInput = '';
            operation = null;
            updateUI();
        }

        function deleteLast() {
            currentInput = currentInput.slice(0, -1) || '0';
            updateUI();
        }

        function calculate() {
            let res;
            const prev = parseFloat(previousInput);
            const curr = parseFloat(currentInput);
            if (isNaN(prev) || isNaN(curr)) return;

            switch (operation) {
                case '+': res = prev + curr; break;
                case '-': res = prev - curr; break;
                case '*': res = prev * curr; break;
                case '/': res = curr === 0 ? 'Erro' : prev / curr; break;
                default: return;
            }

            currentInput = String(res).slice(0, 12);
            operation = null;
            previousInput = '';
            updateUI();
        }
    </script>
</body>
</html>
