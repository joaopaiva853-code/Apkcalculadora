<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JB Financeiro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JB Financeiro">
    <meta name="theme-color" content="#0f0c29">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app {
            width: 100%;
            max-width: 500px;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .app-header {
            padding: 20px 16px 10px;
            text-align: center;
            background: transparent;
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .app-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(0, 230, 118, 0.5);
        }

        /* Conteúdo principal */
        .main-content {
            flex: 1;
            padding: 0 16px 90px 16px; /* espaço para a navbar inferior */
            overflow-y: auto;
            display: none;
        }
        .main-content.active {
            display: block;
        }

        /* Abas de navegação inferiores */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 50;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }
        .nav-item {
            color: #888;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            padding: 8px 12px;
            border-radius: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            user-select: none;
        }
        .nav-item.active {
            color: #00e676;
            background: rgba(0, 230, 118, 0.1);
        }
        .nav-item .nav-icon {
            font-size: 1.4rem;
        }

        /* Cards */
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 16px 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            animation: rotateGlow 8s linear infinite;
        }
        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .card:active { transform: scale(0.97); }
        .card h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 8px;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }
        .card .valor {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.2;
            position: relative;
            z-index: 1;
        }
        .receita { border-top: 3px solid #00e676; }
        .receita h3 { color: #00e676; }
        .receita .valor { color: #00e676; }
        .despesa { border-top: 3px solid #ff6b6b; }
        .despesa h3 { color: #ff6b6b; }
        .despesa .valor { color: #ff6b6b; }
        .compra { border-top: 3px solid #ffd93d; }
        .compra h3 { color: #ffd93d; }
        .compra .valor { color: #ff6b6b; }
        .saldo {
            grid-column: span 2;
            background: linear-gradient(135deg, #00b894, #00e676);
            color: #000;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 230, 118, 0.5);
        }
        .saldo h3 { color: #000; }
        .saldo .valor { color: #000; font-size: 1.8rem; text-shadow: none; }

        .form-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .form-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            color: #e0e0e0;
            border-bottom: 1px solid transparent;
            transition: background 0.2s;
        }
        .form-header:hover { background: rgba(0, 230, 118, 0.15); }
        .form-header .icon-toggle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00b894, #00e676);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.4);
        }
        .form-card.aberto .form-header {
            border-bottom: 1px solid rgba(0, 230, 118, 0.3);
        }
        .form-card.aberto .form-header .icon-toggle {
            transform: rotate(45deg);
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
        }
        .form-body {
            padding: 0 20px 20px;
            display: none;
        }
        .form-card.aberto .form-body { display: block; }
        .input-row { display: flex; flex-direction: column; gap: 12px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label {
            font-size: 0.75rem; font-weight: 600; color: #ccc;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .input-group input, .input-group select {
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            font-size: 0.95rem;
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
            color: #fff;
            outline: none;
        }
        .input-group input::placeholder { color: #888; }
        .input-group input:focus, .input-group select:focus {
            border-color: #00b894;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }
        .two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-add {
            background: linear-gradient(135deg, #00b894, #00e676);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(0, 230, 118, 0.4);
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .btn-add:hover {
            box-shadow: 0 10px 30px rgba(0, 230, 118, 0.6);
            transform: translateY(-2px);
        }
        .btn-add:active { transform: scale(0.98); }

        /* Lista Container */
        .lista-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }
        .lista-cabecalho {
            padding: 14px 18px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; user-select: none;
            transition: background 0.2s;
        }
        .lista-cabecalho:hover { background: rgba(0, 230, 118, 0.1); }
        .lista-cabecalho-esquerda { display: flex; align-items: center; gap: 10px; }
        .lista-cabecalho .icon-lista {
            width: 26px; height: 26px; border-radius: 50%;
            background: rgba(0, 230, 118, 0.3); color: #00e676;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: transform 0.3s ease;
        }
        .lista-container.aberto .lista-cabecalho .icon-lista { transform: rotate(90deg); }
        .lista-titulo { font-weight: 600; color: #e0e0e0; font-size: 0.9rem; }
        .lista-contador {
            background: rgba(0, 230, 118, 0.3); color: #00e676;
            padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
        }
        .lista-conteudo { display: none; border-top: 1px solid rgba(255,255,255,0.05); }
        .lista-container.aberto .lista-conteudo { display: block; }
        .filtros { display: flex; gap: 8px; padding: 12px 18px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .filtros select, .filtros input {
            flex: 1; padding: 10px 14px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15); font-size: 0.82rem;
            background: rgba(0,0,0,0.3); color: #e0e0e0; outline: none;
        }
        .filtros input::placeholder { color: #888; }
        .filtros select:focus, .filtros input:focus {
            border-color: #00b894; box-shadow: 0 0 10px rgba(0, 230, 118, 0.3);
        }
        .transacoes-lista { max-height: 300px; overflow-y: auto; }
        .transacao-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.04);
            gap: 10px; font-size: 0.85rem; transition: background 0.2s;
        }
        .transacao-item:active { background: rgba(0, 230, 118, 0.1); }
        .transacao-item:last-child { border-bottom: none; }
        .transacao-info { flex: 1; }
        .transacao-desc { font-weight: 600; margin-bottom: 3px; color: #e0e0e0; }
        .transacao-meta { font-size: 0.72rem; color: #aaa; display: flex; gap: 8px; flex-wrap: wrap; }
        .transacao-valor { font-weight: 700; font-size: 0.95rem; white-space: nowrap; }
        .transacao-actions button {
            background: none; border: none; font-size: 1.1rem; cursor: pointer;
            padding: 4px; color: #ff6b6b; opacity: 0.7; transition: opacity 0.2s;
        }
        .transacao-actions button:hover { opacity: 1; }
        .sem-dados { text-align: center; padding: 35px 20px; color: #888; font-style: italic; }

        /* Calendário */
        .calendario-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .calendario-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .calendario-header button {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
            color: #e0e0e0; width: 32px; height: 32px; border-radius: 50%;
            cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .calendario-header button:hover { background: rgba(0, 230, 118, 0.3); border-color: #00b894; }
        .calendario-titulo {
            font-size: 0.95rem; font-weight: 600; color: #e0e0e0; text-align: center; cursor: pointer;
            padding: 6px 16px; border-radius: 12px; transition: background 0.2s;
        }
        .calendario-titulo:hover { background: rgba(255,255,255,0.08); }
        .calendario-dias-semana { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
        .calendario-dias-semana span { text-align: center; font-size: 0.7rem; font-weight: 600; color: #aaa; }
        .calendario-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendario-dia {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
            position: relative; color: #ccc;
        }
        .calendario-dia:hover { background: rgba(0, 230, 118, 0.2); color: #fff; }
        .calendario-dia.outro-mes { color: #555; pointer-events: none; }
        .calendario-dia.hoje { background: rgba(0, 230, 118, 0.3); color: #00e676; font-weight: 700; }
        .calendario-dia.selecionado {
            background: #00b894 !important; color: white !important;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.7); animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 230, 118, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); }
        }
        .calendario-dia.tem-lancamento::after {
            content: ''; position: absolute; bottom: 3px; width: 4px; height: 4px;
            border-radius: 50%; background: #00e676;
        }
        .calendario-dia.selecionado.tem-lancamento::after { background: white; }
        .info-dia-selecionado {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .data-selecionada { font-weight: 600; color: #00e676; font-size: 0.85rem; }
        .resumo-dia { display: flex; gap: 14px; font-size: 0.78rem; }
        .resumo-dia span { display: flex; align-items: center; gap: 4px; }
        .resumo-dia .positivo { color: #00e676; }
        .resumo-dia .negativo { color: #ff6b6b; }

        /* Botão flutuante (visível em todas as abas) */
        .btn-flutuante {
            position: fixed; bottom: 100px; right: 25px;
            width: 58px; height: 58px; border-radius: 50%;
            background: linear-gradient(135deg, #8e2de2, #4a00e0);
            color: white; box-shadow: 0 8px 25px rgba(138, 43, 226, 0.6);
            border: none; font-size: 30px;
            display: flex; align-items: center; justify-content: center;
            z-index: 99; cursor: pointer;
            transition: all 0.3s ease;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .btn-flutuante:hover { box-shadow: 0 12px 35px rgba(138, 43, 226, 0.8); animation: none; transform: scale(1.1); }
        .btn-flutuante:active { transform: scale(0.9); }

        footer { text-align: center; margin-top: 20px; color: #aaa; font-size: 0.75rem; opacity: 0.8; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 230, 118, 0.5); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 230, 118, 0.8); }
    </style>
</head>
<body>
    <div class="app">
        <div class="app-header">
            <h1>💰 JB Financeiro</h1>
        </div>

        <!-- Aba Resumo -->
        <div class="main-content active" id="abaResumo">
            <div class="cards">
                <div class="card receita"><h3>Receitas</h3><div class="valor" id="totalReceitas">R$ 0,00</div></div>
                <div class="card despesa"><h3>Despesas</h3><div class="valor" id="totalDespesas">R$ 0,00</div></div>
                <div class="card compra"><h3>Compras</h3><div class="valor" id="totalCompras">R$ 0,00</div></div>
                <div class="card saldo"><h3>Saldo Líquido</h3><div class="valor" id="saldoLiquido">R$ 0,00</div></div>
            </div>

            <div class="form-card" id="formCard">
                <div class="form-header" onclick="toggleFormulario()">
                    <div class="icon-toggle">+</div> Nova Transação
                </div>
                <div class="form-body">
                    <div class="input-row">
                        <div class="input-group"><label>Data</label><input type="date" id="data"></div>
                        <div class="two-cols">
                            <div class="input-group"><label>Tipo</label><select id="tipo"><option value="Receita">Receita</option><option value="Compra">Compra</option><option value="Despesa">Despesa</option></select></div>
                            <div class="input-group"><label>Categoria</label><input type="text" id="categoria" placeholder="Ex: Vendas, Aluguel..."></div>
                        </div>
                        <div class="input-group"><label>Descrição</label><input type="text" id="descricao" placeholder="Detalhes da transação"></div>
                        <div class="two-cols">
                            <div class="input-group"><label>Valor R$</label><input type="number" id="valor" step="0.01" min="0.01" placeholder="0,00"></div>
                            <div class="input-group"><label>Pagamento</label><select id="formaPagamento"><option>PIX</option><option>Dinheiro</option><option>Cartão Crédito</option><option>Cartão Débito</option><option>Boleto</option><option>Transferência</option></select></div>
                        </div>
                        <div class="two-cols">
                            <div class="input-group"><label>Status</label><select id="status"><option>Pago/Recebido</option><option>Pendente</option></select></div>
                            <div class="input-group"><label>Obs</label><input type="text" id="observacoes" placeholder="Opcional"></div>
                        </div>
                        <button class="btn-add" onclick="adicionarTransacao()">✅ Adicionar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Aba Lançamentos -->
        <div class="main-content" id="abaLancamentos">
            <div class="lista-container aberto" id="listaContainer">
                <div class="lista-cabecalho" onclick="toggleLista()">
                    <div class="lista-cabecalho-esquerda">
                        <div class="icon-lista">▶</div>
                        <span class="lista-titulo">Lançamentos do Dia</span>
                    </div>
                    <span class="lista-contador" id="listaContador">0</span>
                </div>
                <div class="lista-conteudo">
                    <div class="filtros">
                        <select id="filtroTipo" onchange="renderizarLista()"><option value="Todos">Todos</option><option value="Receita">Receitas</option><option value="Compra">Compras</option><option value="Despesa">Despesas</option></select>
                        <input type="text" id="filtroBusca" placeholder="Buscar..." oninput="renderizarLista()">
                    </div>
                    <div class="transacoes-lista" id="listaTransacoes"><div class="sem-dados">Nenhum lançamento neste dia</div></div>
                </div>
            </div>
        </div>

        <!-- Aba Calendário -->
        <div class="main-content" id="abaCalendario">
            <div class="calendario-container">
                <div class="calendario-header">
                    <button onclick="mudarMes(-1)">◀</button>
                    <div class="calendario-titulo" id="calendarioTitulo" onclick="irParaHoje()"></div>
                    <button onclick="mudarMes(1)">▶</button>
                </div>
                <div class="calendario-dias-semana"><span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span></div>
                <div class="calendario-grid" id="calendarioGrid"></div>
                <div class="info-dia-selecionado">
                    <span class="data-selecionada" id="dataSelecionadaInfo"></span>
                    <div class="resumo-dia">
                        <span class="positivo" id="resumoReceitasDia">+R$ 0,00</span>
                        <span class="negativo" id="resumoDespesasDia">-R$ 0,00</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navegação inferior -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="abaAtiva('Resumo')" id="navResumo">
                <span class="nav-icon">📊</span>
                <span>Resumo</span>
            </div>
            <div class="nav-item" onclick="abaAtiva('Lancamentos')" id="navLancamentos">
                <span class="nav-icon">📋</span>
                <span>Lançamentos</span>
            </div>
            <div class="nav-item" onclick="abaAtiva('Calendario')" id="navCalendario">
                <span class="nav-icon">📅</span>
                <span>Calendário</span>
            </div>
        </div>

        <!-- Botão flutuante (abre formulário e vai para aba Resumo) -->
        <button class="btn-flutuante" onclick="abrirFormulario()" title="Nova transação">+</button>
    </div>

    <script>
        // ==================== PWA ====================
        function gerarIconeBase64(tamanho, corFundo, corTexto) {
            const canvas = document.createElement('canvas');
            canvas.width = tamanho; canvas.height = tamanho;
            const ctx = canvas.getContext('2d');
            ctx.beginPath(); ctx.arc(tamanho/2, tamanho/2, tamanho/2-4, 0, 2*Math.PI);
            ctx.fillStyle = corFundo; ctx.fill();
            ctx.fillStyle = corTexto;
            ctx.font = `bold ${tamanho*0.5}px "Inter"`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('JB', tamanho/2, tamanho/2);
            return canvas.toDataURL('image/png');
        }
        const manifestData = {
            name: 'JB Financeiro', short_name: 'JB Financeiro',
            start_url: location.href, display: 'standalone',
            background_color: '#0f0c29', theme_color: '#0f0c29',
            icons: [
                { src: gerarIconeBase64(192, '#00b894', '#000'), sizes: '192x192', type: 'image/png' },
                { src: gerarIconeBase64(512, '#00b894', '#000'), sizes: '512x512', type: 'image/png' }
            ]
        };
        const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
        const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(URL.createObjectURL(new Blob([
                `const CACHE='jb-v11';self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['${location.href}'])))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(resp=>{if(resp.ok){const clone=resp.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));}return resp;})))})`
            ], {type: 'application/javascript'})), {scope:'/'});
        }

        // ==================== LÓGICA ====================
        const STORAGE_KEY = 'jb_financeiro_transacoes';
        const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        let transacoes = [];
        let mesAtual = new Date().getMonth();
        let anoAtual = new Date().getFullYear();
        let diaSelecionado = new Date();
        let dataSelecionadaStr = formatarDataISO(diaSelecionado);

        function formatarDataISO(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function formatMoeda(v) { return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }

        function carregar() {
            const d = localStorage.getItem(STORAGE_KEY);
            transacoes = d ? JSON.parse(d) : [];
            salvar();
        }
        function salvar() { localStorage.setItem(STORAGE_KEY, JSON.stringify(transacoes)); }

        function totais() {
            let r=0, c=0, d=0;
            transacoes.forEach(t => { if(t.tipo==='Receita') r+=t.valor; else if(t.tipo==='Compra') c+=t.valor; else d+=t.valor; });
            return { r, c, d, saldo: r-c-d };
        }

        function atualizarDashboard() {
            const {r, c, d, saldo} = totais();
            document.getElementById('totalReceitas').textContent = formatMoeda(r);
            document.getElementById('totalCompras').textContent = formatMoeda(c);
            document.getElementById('totalDespesas').textContent = formatMoeda(d);
            document.getElementById('saldoLiquido').textContent = formatMoeda(saldo);
        }

        function toggleFormulario() {
            const card = document.getElementById('formCard');
            card.classList.toggle('aberto');
            const icon = card.querySelector('.icon-toggle');
            icon.textContent = card.classList.contains('aberto') ? '−' : '+';
            if (card.classList.contains('aberto')) card.scrollIntoView({behavior:'smooth'});
        }

        function abrirFormulario() {
            abaAtiva('Resumo');
            const card = document.getElementById('formCard');
            if (!card.classList.contains('aberto')) toggleFormulario();
            card.scrollIntoView({behavior:'smooth'});
        }

        function adicionarTransacao() {
            const data = document.getElementById('data').value;
            const tipo = document.getElementById('tipo').value;
            const categoria = document.getElementById('categoria').value.trim();
            const descricao = document.getElementById('descricao').value.trim();
            const valor = parseFloat(document.getElementById('valor').value);
            const forma = document.getElementById('formaPagamento').value;
            const status = document.getElementById('status').value;
            const obs = document.getElementById('observacoes').value.trim();
            if(!data||!categoria||!descricao||isNaN(valor)||valor<=0) { alert('Preencha todos os campos obrigatórios.'); return; }
            transacoes.push({data,tipo,categoria,descricao,valor,formaPagamento:forma,status,observacoes:obs});
            salvar();
            document.getElementById('categoria').value=''; document.getElementById('descricao').value='';
            document.getElementById('valor').value=''; document.getElementById('observacoes').value='';
            const [a,m,d] = data.split('-').map(Number);
            dataSelecionadaStr = data; diaSelecionado = new Date(a,m-1,d);
            mesAtual = m-1; anoAtual = a;
            renderizarCalendario(); renderizarLista(); atualizarDashboard(); atualizarResumoDia();
            if (document.getElementById('formCard').classList.contains('aberto')) toggleFormulario();
        }

        function excluir(index) {
            if(confirm('Excluir transação?')) { transacoes.splice(index,1); salvar(); renderizarCalendario(); renderizarLista(); atualizarDashboard(); atualizarResumoDia(); }
        }

        function renderizarLista() {
            const filtroTipo = document.getElementById('filtroTipo').value;
            const busca = document.getElementById('filtroBusca').value.toLowerCase();
            let filtradas = transacoes.filter(t=>{
                const dataOk = t.data === dataSelecionadaStr;
                const tipoOk = filtroTipo==='Todos' || t.tipo===filtroTipo;
                const buscaOk = t.descricao.toLowerCase().includes(busca) || t.categoria.toLowerCase().includes(busca);
                return dataOk && tipoOk && buscaOk;
            });
            document.getElementById('listaContador').textContent = filtradas.length;
            const container = document.getElementById('listaTransacoes');
            if (filtradas.length===0) { container.innerHTML = '<div class="sem-dados">Nenhum lançamento neste dia</div>'; return; }
            filtradas.sort((a,b)=>b.valor-a.valor);
            container.innerHTML = filtradas.map(t=>{
                const idx = transacoes.indexOf(t);
                const cor = t.tipo==='Receita'?'#00e676':(t.tipo==='Compra'?'#ff6b6b':'#ff5252');
                const sinal = t.tipo==='Receita'?'+':'-';
                return `<div class="transacao-item">
                    <div class="transacao-info"><div class="transacao-desc">${t.descricao}</div><div class="transacao-meta"><span>${t.categoria}</span><span>${t.formaPagamento}</span><span>${t.status}</span></div></div>
                    <div class="transacao-valor" style="color:${cor}">${sinal}${formatMoeda(t.valor)}</div>
                    <div class="transacao-actions"><button onclick="excluir(${idx})">🗑️</button></div>
                </div>`;
            }).join('');
        }

        function mudarMes(dir) {
            mesAtual+=dir;
            if(mesAtual<0){mesAtual=11;anoAtual--;} else if(mesAtual>11){mesAtual=0;anoAtual++;}
            renderizarCalendario();
        }
        function selecionarDia(ano,mes,dia) {
            diaSelecionado = new Date(ano,mes,dia);
            dataSelecionadaStr = formatarDataISO(diaSelecionado);
            document.getElementById('data').value = dataSelecionadaStr;
            renderizarCalendario(); renderizarLista(); atualizarResumoDia();
            abaAtiva('Lancamentos'); // opcional: quando selecionar dia, vai para aba lançamentos
        }
        function irParaHoje() {
            const hoje = new Date();
            mesAtual=hoje.getMonth(); anoAtual=hoje.getFullYear();
            diaSelecionado=hoje; dataSelecionadaStr=formatarDataISO(hoje);
            document.getElementById('data').value=dataSelecionadaStr;
            renderizarCalendario(); renderizarLista(); atualizarResumoDia();
        }

        function atualizarResumoDia() {
            let rec=0, desp=0;
            transacoes.forEach(t=>{ if(t.data===dataSelecionadaStr){ if(t.tipo==='Receita')rec+=t.valor; else desp+=t.valor; } });
            document.getElementById('resumoReceitasDia').textContent = '+'+formatMoeda(rec);
            document.getElementById('resumoDespesasDia').textContent = '-'+formatMoeda(desp);
        }

        function renderizarCalendario() {
            document.getElementById('calendarioTitulo').textContent = `${MESES[mesAtual]} ${anoAtual}`;
            document.getElementById('dataSelecionadaInfo').textContent = `📅 ${diaSelecionado.getDate()} de ${MESES[diaSelecionado.getMonth()]} de ${diaSelecionado.getFullYear()}`;
            const grid = document.getElementById('calendarioGrid');
            const primeiroDia = new Date(anoAtual, mesAtual, 1).getDay();
            const ultimoDia = new Date(anoAtual, mesAtual+1, 0).getDate();
            const ultimoDiaMesAnterior = new Date(anoAtual, mesAtual, 0).getDate();
            const hojeStr = formatarDataISO(new Date());
            const diasComLanc = new Set();
            transacoes.forEach(t=>{ if(t.data){ const [a,m,d]=t.data.split('-').map(Number); if(a===anoAtual && m===mesAtual+1) diasComLanc.add(d); } });
            let html = '';
            for(let i=primeiroDia-1; i>=0; i--) html += `<div class="calendario-dia outro-mes">${ultimoDiaMesAnterior-i}</div>`;
            for(let dia=1; dia<=ultimoDia; dia++) {
                const dataDia = new Date(anoAtual, mesAtual, dia);
                const dataStr = formatarDataISO(dataDia);
                let classes = ['calendario-dia'];
                if(dataStr===hojeStr) classes.push('hoje');
                if(dataStr===dataSelecionadaStr) classes.push('selecionado');
                if(diasComLanc.has(dia)) classes.push('tem-lancamento');
                html += `<div class="${classes.join(' ')}" onclick="selecionarDia(${anoAtual},${mesAtual},${dia})">${dia}</div>`;
            }
            const totalMostrados = primeiroDia + ultimoDia;
            const restantes = totalMostrados%7===0?0:7-(totalMostrados%7);
            for(let dia=1; dia<=restantes; dia++) html += `<div class="calendario-dia outro-mes">${dia}</div>`;
            grid.innerHTML = html;
        }

        function toggleLista() { document.getElementById('listaContainer').classList.toggle('aberto'); }
        function abrirLista() { if(!document.getElementById('listaContainer').classList.contains('aberto')) document.getElementById('listaContainer').classList.add('aberto'); }

        // Navegação por abas
        function abaAtiva(aba) {
            document.querySelectorAll('.main-content').forEach(el=>el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
            if(aba==='Resumo') { document.getElementById('abaResumo').classList.add('active'); document.getElementById('navResumo').classList.add('active'); }
            else if(aba==='Lancamentos') { document.getElementById('abaLancamentos').classList.add('active'); document.getElementById('navLancamentos').classList.add('active'); renderizarLista(); }
            else if(aba==='Calendario') { document.getElementById('abaCalendario').classList.add('active'); document.getElementById('navCalendario').classList.add('active'); renderizarCalendario(); }
        }

        window.onload = () => {
            carregar();
            document.getElementById('data').value = dataSelecionadaStr;
            renderizarCalendario();
            renderizarLista();
            atualizarDashboard();
            atualizarResumoDia();
            abaAtiva('Resumo'); // inicia na aba resumo
        };
    </script>
</body>
</html>
