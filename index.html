<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Pro v4.2</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            --panel-bg: #121212;
            --btn-default: #1e1e1e;
            --btn-op: #2196f3;
            --btn-eq: #4caf50;
            --btn-clear: #f44336;
            --text-accent: #90caf9;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: bg-anim 15s ease infinite;
            overflow: hidden;
            display: flex;
        }

        @keyframes bg-anim {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }

        .app {
            width: 100vw;
            height: 100vh;
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
        }

        /* Topo: Calendário e Relógio */
        .header-top {
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .calendar-box {
            color: var(--text-accent);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .clock {
            color: #fff;
            font-family: monospace;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .sub-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            font-size: 0.75rem;
            color: #666;
        }

        .display-container {
            background: #000;
            padding: 30px 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            box-shadow: inset 0 2px 15px rgba(255,255,255,0.03);
            border: 1px solid #1a1a1a;
        }

        .history { color: #546e7a; font-size: 1.2rem; margin-bottom: 8px; min-height: 1.4em; }
        .current { 
            color: #fff; 
            font-size: 3.5rem; 
            font-family: monospace; 
            word-break: break-all;
            line-height: 1;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            flex-grow: 1;
            padding-bottom: 20px;
        }

        button {
            border: none;
            border-radius: 18px;
            background: var(--btn-default);
            color: #fff;
            font-size: 1.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            box-shadow: 0 4px 0 #000;
        }

        button:active { 
            transform: translateY(3px);
            box-shadow: 0 1px 0 #000;
            filter: brightness(1.3);
        }
        
        .op { background: var(--btn-op); }
        .eq { background: var(--btn-eq); grid-column: span 2; }
        .clear { background: var(--btn-clear); }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #333;
            padding-bottom: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Novo Topo com Calendário em destaque -->
    <div class="header-top">
        <div class="calendar-box" id="dateText">--/--/--</div>
        <div class="clock" id="clock">00:00:00</div>
    </div>

    <div class="sub-header">
        <span id="soundToggle" style="cursor:pointer">🔊 SOM: ON</span>
        <span>CALCULADORA PRO</span>
    </div>

    <div class="display-container">
        <div class="history" id="history"></div>
        <div class="current" id="display">0</div>
    </div>

    <div class="buttons">
        <button class="clear" onclick="clearAll()">C</button>
        <button onclick="backspace()">⌫</button>
        <button class="op" onclick="addOp('/')">÷</button>
        <button class="op" onclick="addOp('*')">×</button>

        <button onclick="addNum('7')">7</button>
        <button onclick="addNum('8')">8</button>
        <button onclick="addNum('9')">9</button>
        <button class="op" onclick="addOp('-')">-</button>

        <button onclick="addNum('4')">4</button>
        <button onclick="addNum('5')">5</button>
        <button onclick="addNum('6')">6</button>
        <button class="op" onclick="addOp('+')">+</button>

        <button onclick="addNum('1')">1</button>
        <button onclick="addNum('2')">2</button>
        <button onclick="addNum('3')">3</button>
        <button onclick="addNum('.')">.</button>

        <button onclick="addNum('0')">0</button>
        <button class="eq" onclick="calculate()">=</button>
    </div>

    <div class="footer">ENGINE V4.2 • 2026</div>
</div>

<script>
    const display = document.getElementById("display");
    const history = document.getElementById("history");
    const soundBtn = document.getElementById("soundToggle");
    
    let currentInput = "0";
    let soundOn = true;
    let audioCtx;

    function playClick() {
        if (!soundOn) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    soundBtn.onclick = () => {
        soundOn = !soundOn;
        soundBtn.innerText = soundOn ? "🔊 SOM: ON" : "🔇 SOM: OFF";
    };

    function updateDisplay() {
        display.innerText = currentInput;
    }

    function addNum(num) {
        playClick();
        if (currentInput === "0" && num !== ".") currentInput = num;
        else if (currentInput.length < 18) currentInput += num;
        updateDisplay();
    }

    function addOp(op) {
        playClick();
        const lastChar = currentInput.slice(-1);
        if (["+", "-", "*", "/"].includes(lastChar)) {
            currentInput = currentInput.slice(0, -1) + op;
        } else {
            if(currentInput !== "Erro") currentInput += op;
        }
        updateDisplay();
    }

    function clearAll() {
        playClick();
        currentInput = "0";
        history.innerText = "";
        updateDisplay();
    }

    function backspace() {
        playClick();
        if(currentInput === "Erro") currentInput = "0";
        else currentInput = currentInput.slice(0, -1) || "0";
        updateDisplay();
    }

    function calculate() {
        playClick();
        try {
            // Substitui os símbolos visuais por operadores reais
            const expression = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
            const result = new Function(`return ${expression}`)();
            
            history.innerText = currentInput + " =";
            
            if (!isFinite(result)) {
                currentInput = "Erro";
            } else {
                // Formata o resultado para não quebrar a tela
                currentInput = Number.isInteger(result) ? 
                    result.toString() : 
                    parseFloat(result.toFixed(8)).toString();
            }
        } catch {
            currentInput = "Erro";
        }
        updateDisplay();
    }

    function updateDateTime() {
        const now = new Date();
        // Relógio
        document.getElementById("clock").innerText = now.toLocaleTimeString('pt-BR');
        // Calendário no topo
        const options = { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' };
        document.getElementById("dateText").innerText = now.toLocaleDateString('pt-BR', options);
    }

    setInterval(updateDateTime, 1000);
    updateDateTime();
</script>

</body>
</html>
